<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        /* 색상 키워드 표기 */
        .cls1 { color:blueviolet; }

        /* RGB 표기 */
        /* Red Greem Blue 0~255 */
        .cls2 { color: rgb(50, 123, 215); }

        /* RGBA : RGB + Alpha(투명도 0~1) */
        .cls3 { color: rgb(50, 123, 215, 0.5); }

        /* 16진수 HEX 표기 00~ff */
        .cls4 { color: #ff3737; }

    </style>
</head>
<body>
    
    <h1 class="cls1">color check cls1</h1>

    <h1 class="cls2">color check cls2</h1>

    <h1 class="cls3">color check cls3</h1>

    <h1 class="cls4">color check cls4</h1>

</body>
</html>
