<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /*
            display 속성
            none        : 표시 X
            block       : 한줄 다 차지, 사이즈(width, height)적용 가능, 여백 적용
            inline      : 컨텐츠 크기만큼만 차지, 사이즈 적용 불가, 같은줄 옆에 나란히 배치, 여백 적용(좌/우)
            inline-block: 자체적으로는 block 처럼 작동 (사이즈, 여백)
                          외부적으로는 inline 처럼 작동 (다른 요소와 상호작용 -> 같은줄 옆에 나란히 배치)
        */

        .box1 {
            /* div 태그 기본 성격 block */

            width: 200px;
            height: 100px;
            border: 1px solid black;

            margin: 10px;
            padding: 10px;

            /* display : block inline inline-block none */
            display: none;
        }

        .box2 {
            /* div 태그 기본 성격 block */

            width: 200px;
            height: 100px;
            border: 1px solid black;

            margin: 10px;
            padding: 10px;

            display: block;
        }

        .box3 {
            /* div 태그 기본 성격 block */

            width: 200px;
            height: 100px;
            border: 1px solid black;

            margin: 10px;
            padding: 10px;

            /* block이라서 width,height가 적용되고 inline이라서 옆에 요소가 바로 붙는다.  */
            display: inline-block;
        }

        .span1 {
            width: 200px;
            height: 100px;
            /* display: block; */
            display: inline;
        }

        .parent {
            width: 200px;
            height: 100px;
            border: 1px solid blue;
        }

        .child {
            width: 100px;
            height: 50px;
            border: 1px solid red;

            display: none;
        }

        .parent:hover .child {
            display: block;
        }

        /* parent가 hover상태일때 parent의 자손인 span의 상태를 변경 */
        .parent:hover > span {
            color: blue;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    
    <div class="box1">box1</div>
    <div class="box2">box2</div>
    <div class="box3">box3</div>

    <span class="span1">span1</span>
    <span>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Vero explicabo eius officiis sed consequuntur nobis unde debitis veritatis minus sapiente expedita esse, molestiae laborum inventore voluptates nulla dolores veniam nam.</span>

    <div class="parent">
        <span>부모</span>
        <div class="child">
            자식
        </div>
    </div>

</body>
</html>
