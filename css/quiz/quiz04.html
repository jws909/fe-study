<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        .header {
            margin-top: 0px;
            background-color: lightgray;
        }

        .black-box {
            width: 500px;
            height: 300px;
            border: 5px solid black;

            margin: 50px;
            position: relative;
        }

        .box {
            width: 100px;
            height: 100px;
        }

        .red-box {
            background-color: red;
        }

        .green-box {
            background-color: green;
            position: absolute;
            left: 50px;
            top: 50px;
            z-index: 1;
        }

        .yellow-box {
            background-color: yellow;
        }
    </style>
</head>
<body>
    
    <div class="header">
        <h3>배경색이 lightgray</h3>
        <h3>h3글자</h3>
    </div>

    <div class="black-box">
        <div class="box red-box">A</div>
        <div class="box green-box">B</div>
        <div class="box yellow-box">C</div>
    </div>

</body>
</html>
