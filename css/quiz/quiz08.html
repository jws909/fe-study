<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: blue;
            margin: 20px;
            position: relative;
        }

        .horizontal {
            animation-name: horizontal-ani;
            animation-duration: 3s;
            animation-direction: alternate;
            animation-fill-mode: both;
            animation-iteration-count: infinite;
            animation-play-state: paused;
        }

        .vertical {
            animation-name: vertical-ani;
            animation-duration: 3s;
            animation-direction: alternate;
            animation-fill-mode: both;
            animation-iteration-count: infinite;
            animation-play-state: paused;
        }

        .diagonal {
            animation-name: diagonal-ani;
            animation-duration: 3s;
            animation-direction: alternate;
            animation-fill-mode: both;
            animation-iteration-count: infinite;
            animation-play-state: paused;
        }

        .container:hover .horizontal{
            animation-play-state: running;
        }

        .container:hover .vertical {
            animation-play-state: running;
        }

        .container:hover .diagonal {
            animation-play-state: running;
        }

        .container:hover .horizontal:hover {
            animation-play-state: paused;
        }

        .container:hover .vertical:hover {
            animation-play-state: paused;
        }

        .container:hover .diagonal:hover {
            animation-play-state: paused;
        }

        @keyframes horizontal-ani {
            0% {
                left: 0px;
                background-color: blue;
            }
            50% {
                left: 150px;
                background-color: orange;
            }
            100% {
                left: 300px;
                background-color: pink;
            }
        }

        @keyframes vertical-ani {
            0% {
                top: 0px;
                background-color: blue;
            }
            50% {
                top: 150px;
                background-color: orange;
            }
            100% {
                top: 300px;
                background-color: pink;
            }
        }

        @keyframes diagonal-ani {
            0% {
                top: 0px;
                left: 0px;
                background-color: blue;
            }
            50% {
                top: 150px;
                left: 150px;
                background-color: orange;
            }
            100% {
                top: 300px;
                left: 300px;
                background-color: pink;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box horizontal"></div>
        <div class="box vertical"></div>
        <div class="box diagonal"></div>
    </div>
</body>
</html>
