<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        .h-container {
            display: flex;
        }

        .v-container {
            display: flex;
            flex-direction: column;
        }

        .box {
            width: 100%;
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="h-container">
            <div class="box" style="background-color: yellow;"></div>
            <div class="box" style="background-color: gray;"></div>
        </div>
        <div class="box" style="background-color: blueviolet;"></div>
        <div class="h-container">
            <div class="box" style="background-color: lightblue; width: 40%; height: 250px;"></div>
            <div class="v-container" style="width: 60%; height: 250px;">
                <div class="box" style="background-color: yellow; height: 50%;"></div>
                <div class="box" style="background-color: plum; height: 50%;"></div>
            </div>
        </div>
        <div class="h-container">
            <div class="box" style="background-color: yellow;"></div>
            <div class="box" style="background-color: orange;"></div>
            <div class="box" style="background-color: yellow;"></div>
            <div class="box" style="background-color: yellowgreen;"></div>
        </div>
    </div>
</body>
</html>
