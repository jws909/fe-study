<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .text-center {
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            width: 700px;
            margin: 50px auto 0;
            border: 2px solid black;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            height: 100px;
        }
        .main-menu {
            width: 30%;
            background-color: red;
        }
        .my-page {
            width: 15%;
            background-color: red;
        }

        .main {
            display: flex;
            height: 300px;
        }
        .content {
            width: 70%;
            background-color: orange;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
        }
        .view-container {
            display: flex;
            justify-content: space-around;
        }
        .view {
            width: 100px;
            height: 50px;
            background-color: black;
            transition-property: transform;
            transition-duration: 0.3s;
        }
        .view:hover {
            transform: scale(1.3);
        }

        .aside {
            width: 30%;
            background-color: green;
        }

        .footer {
            height: 100px;
            background-color: blue;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="main-menu text-center">메인메뉴</div>
            <div class="my-page text-center">마이페이지</div>
        </div>
        <div class="main">
            <div class="content">
                <div class="view-container">
                    <div class="view"></div>
                    <div class="view"></div>
                    <div class="view"></div>
                </div>
                <div class="view-container">
                    <div class="view"></div>
                    <div class="view"></div>
                    <div class="view"></div>
                </div>
            </div>
            <div class="aside text-center">aside</div>
        </div>
        <div class="footer text-center">footer</div>
    </div>
</body>
</html>
