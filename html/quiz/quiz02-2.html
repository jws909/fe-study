<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <p>사용자 ID : <input type="text"></p>
        <p>
            비밀 번호 : <input type="password">
            <button type="button">완료</button>
        </p>
        <p>
            <select>
                <option>짜장면</option>
                <option selected>짬뽕</option>
                <option>탕수육</option>
            </select>
        </p>
        <p>
            <label><input type="checkbox">짜장면</label>
            <label><input type="checkbox" checked>짬뽕</label>
            <label><input type="checkbox">탕수육</label>
        </p>
        <p>이름 : <input type="text"></p>
        <p>암호 : <input type="password"></p>
        <p>자소서 : <textarea></textarea></p>
        <p>
            검색 : <input type="text">
            <input type="button" value="Q1">
            <button type="button">Q2</button>
        </p>
        <p>
            submit 버튼 : 
            <input type="submit" value="전송1">
            <button type="submit">전송2</button>
        </p>
        <p>
            reset 버튼 : 
            <input type="reset" value="리셋1">
            <button type="reset">리셋2</button>
        </p>
    </form>
</body>
</html>
