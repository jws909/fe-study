<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <p>고객명 : <input type="text"></p>
        <p>전화번호 : <input type="tel"></p>
        <p>E-mail : <input type="email"></p>
        <p>
            피자선택 : 
            <select>
                <option selected disabled>피자를 선택하세요</option>
                <option>치즈</option>
                <option>페퍼로니</option>
                <option>콤비네이션</option>
            </select>
        </p>
        <fieldset>
            <legend>피자 사이즈</legend>
            <p><label><input type="radio" name="size">Small</label></p>
            <p><label><input type="radio" name="size">Medium</label></p>
            <p><label><input type="radio" name="size">Large</label></p>
        </fieldset>
        <fieldset>
            <legend>토핑 선택</legend>
            <p><label><input type="checkbox">베이컨</label></p>
            <p><label><input type="checkbox">치즈</label></p>
            <p><label><input type="checkbox">양파</label></p>
            <p><label><input type="checkbox">버섯</label></p>
        </fieldset>
        <p>희망배송시간 : <input type="time"></p>
        <p>배송시 요청사항 : <textarea></textarea></p>
        <input type="submit" value="주문하기">
    </form>
</body>
</html>
