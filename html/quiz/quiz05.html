<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table, th, td {
        border:1px solid black;
        border-collapse: collapse;
        }
    </style>
</head>
<body>
    <h1>나의 점심 취향 설문조사</h1>
    <form>
        <p>이름: <input type="text"></p>
        <fieldset>
            <legend>학년 선택</legend>
            <table>
                <thead>
                    <tr>
                        <th>번호</th>
                        <th>학년</th>
                        <th>선택</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td><label for="first">1학년</label></td>
                        <td><input type="radio" name="grade" id="first"></td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td><label for="second">2학년</label></td>
                        <td><input type="radio" name="grade" id="second"></td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td><label for="third">3학년</label></td>
                        <td><input type="radio" name="grade" id="third"></td>
                    </tr>
                    <tr>
                        <td>4</td>
                        <td><label for="fourth">4학년</label></td>
                        <td><input type="radio" name="grade" id="fourth"></td>
                    </tr>
                </tbody>
            </table>
        </fieldset>
        <br>
        <fieldset>
            <legend>좋아하는 음식 (복수 선택 가능)</legend>
            <label><input type="checkbox">한식</label><br>
            <label><input type="checkbox">중식</label><br>
            <label><input type="checkbox">일식</label><br>
            <label><input type="checkbox">양식</label><br>
            <label><input type="checkbox">분식</label>
        </fieldset>
        <br>
        <input type="submit" value="제출하기">
    </form>
</body>
</html>
