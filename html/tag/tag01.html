<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
        vs code에서 html파일에서 ! 자동완성 시 lang="en"이라고 나올경우 변경법 
        Ctrl + , 입력으로 설정창을 열고 emmet 검색
        -> emmet snippets variable에 Add item 클릭
        -> lang에 ko 추가
    -->

    <!-- 블록요소 vs 인라인요소 -->
    <!-- p 태그     span 태그 -->
    
    <p>첫번째 블록 요소</p>
    <p>두번째 블록 요소</p>
    <span>첫번째 인라인 요소</span>
    <span>두번째 인라인 요소</span>
    <p>세번째 블록 요소</p>
    <!-- 블록 요소는 자동 줄바꿈, 인라인 요소는 자리부족시에만 줄바꿈 -->
    
</body>
</html>
